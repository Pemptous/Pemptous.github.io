<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>  
        <meta name="viewport" content="width=device-width,initial-scale=1"/>
        <title>Panos' Akinator</title>
        <!-- <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css"> -->
        <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

        <style>
            * {
                box-sizing: border-box;
            }

            body {
                background-color: #0d1117;
                color: #e6edf3;
                font-family: 'Segoe UI', system-ui, sans-serif;
                max-width: 700px;
                margin: 0 auto;
                padding: 20px 16px 40px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 4px;
                color: #58a6ff;
            }

            p.intro {
                color: #8b949e;
                margin-top: 0;
            }

            .section-label {
                font-size: 1.1em;
                font-weight: bold;
                color: #8b949e;
                letter-spacing: 1px;
                margin: 20px 0 8px;
                text-transform: uppercase;
            }

            #console {
                background-color: #010409;
                color: #33ff33;
                font-family: 'Courier New', monospace;
                font-size: 0.85em;
                padding: 14px;
                border-radius: 8px;
                border: 1px solid #30363d;
                max-height: 220px;
                overflow-y: auto;
                white-space: pre-wrap;
                line-height: 1.5;
            }

            #box {
                background-color: #161b22;
                color: #f0f0f0;
                font-family: 'Courier New', monospace;
                font-weight: bold;
                font-size: 1.2em;
                padding: 18px;
                border-radius: 8px;
                border: 2px solid #58a6ff;
                text-align: center;
                min-height: 1.5em;
            }

            .buttons {
                display: flex;
                gap: 12px;
                margin-top: 24px;
            }

            button {
                flex: 1;
                border: none;
                border-radius: 8px;
                padding: 18px 0;
                font-size: 1.4em;
                font-weight: bold;
                color: white;
                cursor: pointer;
                transition: transform 0.08s ease, filter 0.15s ease;
            }

            button:active {
                transform: scale(0.96);
            }

            #yes {
                background-color: #238636;
            }
            #yes:hover {
                filter: brightness(1.15);
            }

            #dunno {
                background-color: #d29922;
            }
            #dunno:hover {
                filter: brightness(1.15);
            }

            #no {
                background-color: #da3633;
            }
            #no:hover {
                filter: brightness(1.15);
            }
        </style>
    </head>
  
    <body>
        <h1>Panos' Akinator</h1>
        <p class="intro">Use this website to guess yourself, me or stalk my friends. Your choice.</p>

        <p class="section-label">Dialogue</p>
        <div id="console"><i>### SCRIPT INITIALIZATION ###</i><br></div>

        <p class="section-label">Question / Guess</p>
        <div id="box"></div>

        <div class="buttons">
            <button id="yes">YES</button>
            <button id="dunno">DUNNO</button>
            <button id="no">NO</button>
        </div>
        
        <script type="py" src="./main.py" config="./pyscript.json"></script>
    </body>
</html>
